name: Run npm install & start

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-start:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'   # or your preferred version

      - name: Install dependencies
        run: npm install

      - name: Start application (⚠️ will run forever)
        run: npm start
